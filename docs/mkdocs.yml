# 260531Ch: MkDocs Material configuration for the CSManager GitHub Pages manual.
# 260626Cl: Extended from en/ja to 11 languages (added de/fr/es/pt/it/ru/zh-Hans/zh-Hant/ko)
#   to match the application UI (Crystallography/Localization/SupportedCultures.cs). Per-language
#   folders under src/<code>/ with nav duplicated per language (kept explicit so `mkdocs build
#   --strict` catches any missing/extra page). search.lang lists stemmers bundled by
#   mkdocs-material (one `zh` serves zh-Hans and zh-Hant; `ko` for Korean); extra.alternate
#   carries every language for the header selector and is retargeted to the matching slug by
#   language_switch.js.
site_name: CSManager Manual
site_description: CSManager user manual
site_url: https://seto77.github.io/CSManager/
repo_url: https://github.com/seto77/CSManager
repo_name: seto77/CSManager
edit_uri: edit/master/docs/src/

docs_dir: src
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.footer
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - ja
        - de
        - fr
        - es
        - pt
        - it
        - ru
        - zh
        - ko
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - abbr
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      auto_append:
        - includes/abbreviations.md
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/language_switch.js

extra:
  alternate:
    - name: English
      link: /CSManager/
      lang: en
    - name: 日本語
      link: /CSManager/ja/
      lang: ja
    - name: Deutsch
      link: /CSManager/de/
      lang: de
    - name: Français
      link: /CSManager/fr/
      lang: fr
    - name: Español
      link: /CSManager/es/
      lang: es
    - name: Português
      link: /CSManager/pt/
      lang: pt
    - name: Italiano
      link: /CSManager/it/
      lang: it
    - name: Русский
      link: /CSManager/ru/
      lang: ru
    - name: 简体中文
      link: /CSManager/zh-Hans/
      lang: zh-Hans
    - name: 繁體中文
      link: /CSManager/zh-Hant/
      lang: zh-Hant
    - name: 한국어
      link: /CSManager/ko/
      lang: ko

